name: CMake build (xmon)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y libncurses5-dev libncursesw5-dev dpkg-dev

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

    - name: Build
      run: cmake --build build --config ${{env.BUILD_TYPE}}

    - name: Package DEB
      run: |
        mkdir -p pkg/usr/local/bin
        cp build/xmon pkg/usr/local/bin/
        dpkg-deb --build pkg xmon.deb

    - name: Upload DEB
      uses: actions/upload-artifact@v4
      with:
        name: xmon-deb
        path: xmon.deb
