name: Release xmon

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libncurses5-dev libncursesw5-dev dpkg-dev

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build

    - name: Check binary exists
      run: ls -lah build/

    - name: Create DEB package
      run: |
        mkdir -p pkg/usr/local/bin
        mkdir -p pkg/DEBIAN

        cp build/xmon pkg/usr/local/bin/

        printf "Package: xmon\nVersion: 0.1\nSection: utils\nPriority: optional\nArchitecture: amd64\nMaintainer: xmon\nDescription: system monitor\n" > pkg/DEBIAN/control

        dpkg-deb --build pkg xmon.deb

    - name: Create GitHub Release + upload asset
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        files: xmon.deb
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
